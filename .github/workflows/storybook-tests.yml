name: Frontend tests

# Runs the full generated test stack on every pull request:
# story coverage gate · Storybook stories · RTL unit · Playwright E2E · BDD bindings.
on:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Stories · Unit · E2E · BDD
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Chromium serves the Vitest browser project + Cucumber; all three engines
      # are needed for the multi-browser Playwright E2E run.
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      # The platform's own tests (generators must stay correct on hard shapes).
      - name: Platform self-test
        run: npm run test:platform

      # Fail early if any component is missing a story (i.e. is untested).
      - name: Story coverage gate
        run: npm run stories:check

      # Storybook stories (render + interaction + a11y) in headless Chromium.
      - name: Storybook story tests
        run: npm run test:stories

      # React Testing Library unit tests (jsdom `unit` project).
      - name: Unit tests
        run: npm run test:unit

      # Playwright E2E across chromium + firefox + webkit (its webServer boots the
      # Vite app). Excludes @visual specs — those need per-platform baselines
      # (committed darwin baselines won't match Linux CI), so run them separately.
      - name: E2E tests (multi-browser)
        run: npm run e2e

      # Validate every Cucumber step is bound (the dry-run can't fail on its own
      # in cucumber 13, so we grep for undefined/ambiguous and fail explicitly).
      - name: BDD step-binding gate
        run: |
          out=$(npm run --silent bdd:dry 2>&1); echo "$out"
          echo "$out" | grep -qiE '[0-9]+ (undefined|ambiguous)' && { echo 'FAIL: unbound steps'; exit 1; } || echo 'OK: all steps bound'

  # Coverage gap report + gate (Phase 7). Publishes the markdown report to the
  # Actions run summary and fails the build on a coverage regression. `ftap scan`
  # is dependency-free, so this job needs no `npm ci` / browser install.
  report:
    name: Testing gap report + gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need the base ref so PRs can diff head vs base

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Scan the PR's base commit with THIS branch's scanner, so the report can
      # diff head vs base. Tolerant of a missing base (e.g. some fork PRs).
      - name: Scan base branch (for the PR diff)
        if: github.event_name == 'pull_request'
        continue-on-error: true
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          git worktree add ../base "$BASE_SHA"
          node platform/cli.mjs scan ../base

      # Report → $GITHUB_STEP_SUMMARY (set automatically by Actions) and gate the
      # build at the current bar. On PRs, also fail on a net regression vs base.
      - name: Report + coverage gate
        env:
          DIFF_ARGS: ${{ github.event_name == 'pull_request' && '--baseline=../base/analysis.json --fail-on-new' || '' }}
        run: node platform/cli.mjs ci --min-coverage=100 --max-gaps=0 $DIFF_ARGS

  # Visual regression is a SEPARATE, manually-triggered job: it regenerates the
  # Linux baselines and uploads them as an artifact (committed baselines are
  # darwin-suffixed, so a Linux PR gate would always "fail"). Promote a baseline
  # by committing the artifact's PNGs.
  visual:
    name: Visual regression (manual)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Generate visual baselines (Linux)
        run: npm run e2e:visual:update
      - uses: actions/upload-artifact@v4
        with:
          name: visual-baselines-linux
          path: e2e/visual.spec.ts-snapshots/
